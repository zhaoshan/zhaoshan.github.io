        <!-- 功能菜单 -->

                <div class="menu-icon">📜</div>

                <div class="menu-arrow">›</div>

            <a href="#" class="menu-item" onclick="showToast('功能开发中')">
                <div class="menu-icon">⚙️</div>
                <div class="menu-text">设置</div>

            </a>

        <!-- 关于信息 -->
        <div class="menu-list" style="margin-top: 1rem;">
            <a href="#" class="menu-item" onclick="showToast('天机阁 v1.0.0')">
                <div class="menu-icon">ℹ️</div>
                <div class="menu-text">关于我们</div>

        </div>

        <div style="text-align: center; padding: 2rem 1rem; color: var(--color-text-muted); font-size: 0.75rem;">
            <p>本应用仅供娱乐参考</p>

    <script src="../js/main.js"></script>
    <script>
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(26,26,46,0.95);
                color: var(--color-accent-gold);
                padding: 1rem 1.5rem;
                border-radius: 8px;
                border: 1px solid var(--color-accent-gold);
                z-index: 1000;
                font-size: 0.9rem;
                animation: fadeInUp 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
