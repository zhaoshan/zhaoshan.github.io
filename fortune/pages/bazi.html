<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>八字算命 - 天机阁</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- 粒子背景 -->
    <canvas id="particles-canvas"></canvas>

    <!-- 顶部导航 -->
    <header class="nav-header">
        <a href="../index.html" class="nav-back">← 返回</a>
        <div class="logo">八字命理</div>
        <div style="width: 40px;"></div>
    </header>

    <!-- 主内容 -->
    <main class="page-container">
        <div class="page-header">
            <h1 class="page-title">四柱八字</h1>
            <p class="page-subtitle">输入生辰，推演命盘</p>
        </div>

        <div class="form-container">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">出生年份</label>
                    <input type="number" class="form-input" id="birthYear" placeholder="1990" min="1900" max="2100">
                </div>
                <div class="form-group">
                    <label class="form-label">出生月份</label>
                    <select class="form-input" id="birthMonth">
                        <option value="">请选择</option>
                        <option value="1">正月</option>
                        <option value="2">二月</option>
                        <option value="3">三月</option>
                        <option value="4">四月</option>
                        <option value="5">五月</option>
                        <option value="6">六月</option>
                        <option value="7">七月</option>
                        <option value="8">八月</option>
                        <option value="9">九月</option>
                        <option value="10">十月</option>
                        <option value="11">冬月</option>
                        <option value="12">腊月</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">出生日期</label>
                    <input type="number" class="form-input" id="birthDay" placeholder="1-31" min="1" max="31">
                </div>
                <div class="form-group">
                    <label class="form-label">出生时辰</label>
                    <select class="form-input" id="birthHour">
                        <option value="">请选择</option>
                        <option value="0">子时 (23-01)</option>
                        <option value="1">丑时 (01-03)</option>
                        <option value="2">寅时 (03-05)</option>
                        <option value="3">卯时 (05-07)</option>
                        <option value="4">辰时 (07-09)</option>
                        <option value="5">巳时 (09-11)</option>
                        <option value="6">午时 (11-13)</option>
                        <option value="7">未时 (13-15)</option>
                        <option value="8">申时 (15-17)</option>
                        <option value="9">酉时 (17-19)</option>
                        <option value="10">戌时 (19-21)</option>
                        <option value="11">亥时 (21-23)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">性别</label>
                <div class="gender-select">
                    <div class="gender-option" onclick="BaziCalculator.setGender(this, 'male')">男</div>
                    <div class="gender-option" onclick="BaziCalculator.setGender(this, 'female')">女</div>
                </div>
            </div>

            <button class="btn btn-primary btn-large" onclick="BaziCalculator.calculate()" style="margin-top: 1.5rem;">
                开始测算
            </button>

            <div class="result-panel" id="baziResult">
                <h3 class="result-title">八字解析</h3>
                <div id="baziContent"></div>
            </div>
        </div>
    </main>

    <!-- 底部导航 -->
    <nav class="tab-bar">
        <a href="../index.html" class="tab-item">
            <span class="tab-icon">◈</span>
            <span>首页</span>
        </a>
        <a href="bazi.html" class="tab-item active">
            <span class="tab-icon">☯</span>
            <span>八字</span>
        </a>
        <a href="tarot.html" class="tab-item">
            <span class="tab-icon">🌙</span>
            <span>塔罗</span>
        </a>
        <a href="profile.html" class="tab-item">
            <span class="tab-icon">✦</span>
            <span>我的</span>
        </a>
    </nav>

    <script src="../js/main.js"></script>
</body>
</html>
